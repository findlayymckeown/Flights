<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Hunter — Utah to England</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:      #020203;
      --bg-base:      #050506;
      --bg-elevated:  #0a0a0c;
      --surface:      rgba(255,255,255,0.03);
      --surface-hover:rgba(255,255,255,0.055);
      --border:       rgba(255,255,255,0.08);
      --border-top:   rgba(255,255,255,0.13);
      --fg:           #EDEDEF;
      --fg-muted:     #8A8F98;
      --fg-subtle:    #4B5563;
      --accent:       #5E6AD2;
      --accent-glow:  rgba(94,106,210,0.25);
      --accent-dim:   rgba(94,106,210,0.12);
      --success:      #10B981;
      --success-dim:  rgba(16,185,129,0.1);
      --danger:       #EF4444;
      --danger-dim:   rgba(239,68,68,0.1);
      --warning:      #F59E0B;
      --warning-dim:  rgba(245,158,11,0.1);
      --sidebar-w:    220px;
      --radius:       14px;
      --radius-sm:    8px;
      --ease:         cubic-bezier(0.16,1,0.3,1);
      --mono: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
      --sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
    }
    html { color-scheme: dark; }
    body { font-family: var(--sans); background: var(--bg-deep); color: var(--fg); min-height: 100dvh; overflow-x: hidden; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

    /* ── Blobs ── */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); animation: drift 20s ease-in-out infinite alternate; }
    .blob-1 { width:500px;height:500px;background:rgba(94,106,210,0.07);top:-150px;left:-100px;animation-duration:22s; }
    .blob-2 { width:400px;height:400px;background:rgba(124,58,237,0.06);bottom:0;right:-80px;animation-delay:-8s;animation-duration:18s; }
    .blob-3 { width:300px;height:300px;background:rgba(16,185,129,0.05);top:50%;left:40%;animation-delay:-14s;animation-duration:25s; }
    @keyframes drift {
      0%   { transform:translate(0,0) scale(1); }
      33%  { transform:translate(40px,-30px) scale(1.05); }
      66%  { transform:translate(-20px,50px) scale(0.97); }
      100% { transform:translate(30px,20px) scale(1.02); }
    }
    @media(prefers-reduced-motion:reduce){ .blob { animation:none; } }

    /* ── Layout ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: rgba(5,5,6,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50;
      transition: transform 280ms var(--ease);
    }
    .main { margin-left: var(--sidebar-w); position: relative; z-index: 1; }

    /* ── Mobile ── */
    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: rgba(5,5,6,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      align-items: center; justify-content: space-between;
      padding: 0 1rem; z-index: 60;
    }
    .menu-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--fg); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
    }
    .mobile-title { font-size: .9rem; font-weight: 700; color: var(--fg); }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 49;
    }

    @media(max-width:768px){
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .mobile-header { display: flex; }
      .overlay.show { display: block; }
      .main { margin-left: 0; padding-top: 52px; }
    }

    /* ── Sidebar internals ── */
    .sidebar-brand {
      padding: 1.25rem 1.1rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .brand-logo {
      font-size: .72rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: .45rem;
    }
    .brand-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success); flex-shrink: 0;
      animation: ping 1.8s ease-out infinite;
    }
    @keyframes ping {
      0%  { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
      100%{ box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    .brand-title { font-size: 1rem; font-weight: 800; color: var(--fg); margin-top: .25rem; }
    .brand-sub { font-size: .72rem; color: var(--fg-subtle); margin-top: .1rem; }

    .sidebar-nav { flex: 1; padding: .75rem .6rem; display: flex; flex-direction: column; gap: .25rem; }
    .nav-item {
      display: flex; align-items: center; gap: .7rem;
      padding: .6rem .8rem; border-radius: 10px;
      font-size: .84rem; font-weight: 500; color: var(--fg-muted);
      background: none; border: none; cursor: pointer; width: 100%;
      text-align: left;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .nav-item:hover { background: var(--surface); color: var(--fg); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--fg);
      border: 1px solid rgba(94,106,210,0.25);
    }
    .nav-item svg { flex-shrink: 0; opacity: .7; }
    .nav-item.active svg { opacity: 1; }
    .nav-section-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--fg-subtle);
      padding: .6rem .8rem .2rem;
    }

    .sidebar-footer {
      padding: .9rem 1.1rem;
      border-top: 1px solid var(--border);
      font-size: .72rem; color: var(--fg-subtle); line-height: 1.6;
    }
    .sidebar-footer strong { color: var(--fg-muted); }

    /* ── Page container ── */
    .page { display: none; padding: 2rem 1.5rem 4rem; max-width: 860px; }
    .page.active { display: block; }
    @media(max-width:768px){ .page { padding: 1.25rem 1rem 4rem; } }

    /* ── Section label ── */
    .slabel {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--fg-subtle); margin-bottom: .75rem;
    }
    .mb { margin-bottom: 1rem; }

    /* ── Glass card ── */
    .glass {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-color: var(--border-top);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: background 150ms var(--ease);
    }
    .glass:hover { background: var(--surface-hover); }
    .card-pad { padding: 1.25rem; }

    /* ── Page header ── */
    .page-head { margin-bottom: 1.75rem; }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: .45rem;
      font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-dim);
      border: 1px solid rgba(94,106,210,0.25);
      padding: .25rem .75rem; border-radius: 20px; margin-bottom: .75rem;
    }
    .page-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: ping 1.8s ease-out infinite; }
    .page-h1 { font-size: clamp(1.6rem,4vw,2.2rem); font-weight: 800; letter-spacing: -0.5px; }
    .page-h1 .grad { background: linear-gradient(135deg,var(--accent),#818CF8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .page-sub { color: var(--fg-muted); font-size: .875rem; margin-top: .35rem; }
    .header-pills { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.8rem; }
    .hpill { font-size:.73rem; padding:.2rem .65rem; background:var(--surface); border:1px solid var(--border); border-radius:20px; color:var(--fg-muted); }

    /* ── Status banner ── */
    .status-banner {
      padding: 1.25rem 1.4rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 1.1rem;
      position: relative; overflow: hidden;
    }
    .status-banner::before { content:''; position:absolute; inset:0; opacity:.06; pointer-events:none; }
    .status-banner.over { border-color:rgba(239,68,68,0.25); }
    .status-banner.over::before { background:radial-gradient(ellipse at top left,var(--danger),transparent 70%); }
    .status-banner.found { border-color:rgba(16,185,129,0.3); }
    .status-banner.found::before { background:radial-gradient(ellipse at top left,var(--success),transparent 70%); }
    .status-icon { width:48px;height:48px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem; }
    .status-banner.over  .status-icon { background:var(--danger-dim); border:1px solid rgba(239,68,68,0.25); }
    .status-banner.found .status-icon { background:var(--success-dim); border:1px solid rgba(16,185,129,0.3); }
    .status-text h2 { font-size:1rem; font-weight:700; }
    .status-banner.over  .status-text h2 { color:#FCA5A5; }
    .status-banner.found .status-text h2 { color:#6EE7B7; }
    .status-text p { font-size:.8rem; color:var(--fg-muted); margin-top:.2rem; line-height:1.5; }
    .live-dot { display:inline-block;width:7px;height:7px;background:var(--success);border-radius:50%;margin-right:4px;vertical-align:middle;animation:ping 1.8s ease-out infinite; }

    /* ── Stat grid ── */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.65rem; margin-bottom:1rem; }
    @media(max-width:700px){ .stat-grid { grid-template-columns:1fr 1fr; } }
    .stat-card { padding:1rem 1.1rem; }
    .stat-label { font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-subtle);margin-bottom:.3rem; }
    .stat-val { font-family:var(--mono);font-size:1.55rem;font-weight:700;letter-spacing:-1px;line-height:1; }
    .stat-val.blue   { color:var(--accent); }
    .stat-val.red    { color:var(--danger); }
    .stat-val.yellow { color:var(--warning); }
    .stat-val.green  { color:var(--success); }
    .stat-sub { font-size:.7rem;color:var(--fg-subtle);margin-top:.25rem; }

    /* ── Best card ── */
    .best-card { padding:1.4rem; margin-bottom:1rem; position:relative; }
    .best-card::after { content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35; }
    .route-viz { display:flex;flex-wrap:wrap;align-items:center;gap:.4rem;margin:.5rem 0 .8rem; }
    .atag { font-family:var(--mono);font-size:.76rem;font-weight:700;padding:.2rem .5rem;border-radius:6px;border:1px solid rgba(94,106,210,0.35);background:rgba(94,106,210,0.1);color:#A5B4FC; }
    .atag.pref { border-color:rgba(167,139,250,0.4);background:rgba(124,58,237,0.12);color:#C4B5FD; }
    .rarrow { color:var(--fg-subtle);font-size:.8rem; }
    .chips { display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem; }
    .chip { font-size:.73rem;padding:.18rem .55rem;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--fg-muted); }
    .best-flex { display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem; }
    .big-price { font-family:var(--mono);font-size:2.4rem;font-weight:800;letter-spacing:-2px;line-height:1; }
    .big-price.over  { color:var(--danger);text-shadow:0 0 30px rgba(239,68,68,0.3); }
    .big-price.found { color:var(--success);text-shadow:0 0 30px rgba(16,185,129,0.3); }
    .price-badge { display:inline-block;margin-top:.35rem;font-size:.68rem;padding:.18rem .55rem;border-radius:20px;font-weight:700; }
    .price-badge.over  { background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5; }
    .price-badge.found { background:var(--success-dim);border:1px solid rgba(16,185,129,0.3);color:#6EE7B7; }
    .best-notes { font-size:.79rem;color:var(--fg-muted);line-height:1.65;margin-top:.7rem;padding-top:.7rem;border-top:1px solid var(--border); }

    /* ── Tables ── */
    .table-card { margin-bottom:1rem; overflow:hidden; }
    .table-bar { padding:.85rem 1.2rem .7rem;border-bottom:1px solid var(--border); }
    .tscroll { overflow-x:auto; }
    table { width:100%;border-collapse:collapse;min-width:560px; }
    thead th { padding:.55rem .9rem;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-subtle);background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border); }
    tbody tr { border-bottom:1px solid rgba(255,255,255,0.035);transition:background 120ms var(--ease); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface-hover); }
    tbody tr.dim { opacity:.4; }
    tbody td { padding:.7rem .9rem;font-size:.84rem;vertical-align:middle; }
    .td-mono { font-family:var(--mono);font-weight:700;font-size:.92rem; }
    .td-mono.over  { color:var(--danger); }
    .td-mono.found { color:var(--success); }
    .td-rank { font-family:var(--mono);font-size:.78rem;color:var(--fg-subtle);font-weight:600; }
    .td-man { color:#A5B4FC;font-weight:600; }
    .td-lba { color:#C4B5FD;font-weight:600; }
    .tlegend { padding:.55rem 1.2rem;border-top:1px solid var(--border);font-size:.69rem;color:var(--fg-subtle);display:flex;gap:1.25rem;flex-wrap:wrap; }

    /* ── Badges ── */
    .badge { display:inline-flex;align-items:center;gap:.2rem;font-size:.67rem;font-weight:700;padding:.16rem .52rem;border-radius:6px;white-space:nowrap; }
    .badge-red    { background:var(--danger-dim);color:#FCA5A5;border:1px solid rgba(239,68,68,0.25); }
    .badge-green  { background:var(--success-dim);color:#6EE7B7;border:1px solid rgba(16,185,129,0.25); }
    .badge-yellow { background:var(--warning-dim);color:#FDE68A;border:1px solid rgba(245,158,11,0.25); }
    .badge-gray   { background:rgba(255,255,255,0.04);color:var(--fg-subtle);border:1px solid var(--border); }
    .badge-accent { background:var(--accent-dim);color:#A5B4FC;border:1px solid rgba(94,106,210,0.3); }

    /* ── 2-col grid ── */
    .grid2 { display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem; }
    @media(max-width:580px){ .grid2 { grid-template-columns:1fr; } }

    /* ── Market bars ── */
    .bar-row { margin-bottom:.65rem; }
    .bar-row:last-of-type { margin-bottom:0; }
    .bar-lbl { display:flex;justify-content:space-between;font-size:.73rem;color:var(--fg-muted);margin-bottom:.3rem; }
    .bar-lbl span:last-child { font-family:var(--mono);color:var(--danger); }
    .bar-track { height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden; }
    .bar-fill { height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--danger));transition:width .8s var(--ease); }
    .bar-note { font-size:.69rem;color:var(--fg-subtle);margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border); }

    /* ── Context rows ── */
    .ctx-row { display:flex;gap:.55rem;padding:.35rem 0;font-size:.82rem;color:var(--fg-muted);line-height:1.5;border-bottom:1px solid rgba(255,255,255,0.035); }
    .ctx-row:last-child { border-bottom:none; }

    /* ── Rejected / drop items ── */
    .log-empty { padding:1.75rem;text-align:center;color:var(--fg-subtle);font-size:.83rem;line-height:1.7; }
    .list-item { display:flex;align-items:flex-start;gap:.65rem;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,0.035);font-size:.83rem; }
    .list-item:last-child { border-bottom:none; }
    .item-x { color:var(--danger);font-weight:700;flex-shrink:0; }
    .item-sub { font-size:.73rem;color:var(--fg-subtle);margin-top:.12rem; }

    /* ── Tips ── */
    .tip-row { display:flex;gap:.65rem;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,0.035);font-size:.83rem;align-items:flex-start; }
    .tip-row:last-child { border-bottom:none; }
    .tip-text { color:var(--fg-muted);line-height:1.6; }
    .tip-text strong { color:var(--fg); }

    /* ── Links grid ── */
    .links-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.45rem; }
    .link-btn { display:block;padding:.55rem .9rem;text-align:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--accent);font-size:.8rem;font-weight:500;transition:background 150ms var(--ease),border-color 150ms var(--ease),transform 100ms var(--ease);cursor:pointer; }
    .link-btn:hover { background:var(--accent-dim);border-color:rgba(94,106,210,0.4);transform:translateY(-1px);text-decoration:none; }
    .link-btn:active { transform:translateY(0); }

    /* ── Page 2: Strategy cards ── */
    .strategy-grid { display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1rem; }
    @media(max-width:620px){ .strategy-grid { grid-template-columns:1fr; } }
    .strat-card { padding:1.15rem;display:flex;flex-direction:column;gap:.65rem; }
    .strat-head { display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem; }
    .strat-name { font-size:.88rem;font-weight:700;color:var(--fg); }
    .strat-price { font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--warning);white-space:nowrap; }
    .strat-steps { display:flex;flex-direction:column;gap:.3rem; }
    .strat-step { font-size:.75rem;color:var(--fg-muted);display:flex;gap:.45rem;align-items:flex-start; }
    .step-n { font-family:var(--mono);font-size:.68rem;color:var(--fg-subtle);flex-shrink:0;margin-top:.05rem; }
    .strat-procon { display:grid;grid-template-columns:1fr 1fr;gap:.5rem;padding:.6rem;background:rgba(255,255,255,0.02);border-radius:8px; }
    .pro-list,.con-list { display:flex;flex-direction:column;gap:.2rem; }
    .pro-item,.con-item { font-size:.7rem;display:flex;gap:.3rem;color:var(--fg-muted); }
    .pro-icon { color:var(--success);flex-shrink:0; }
    .con-icon { color:var(--danger);flex-shrink:0; }
    .strat-action { display:flex;gap:.4rem; }
    .btn-sm { flex:1;padding:.4rem .6rem;text-align:center;border-radius:7px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:opacity 150ms; }
    .btn-sm:hover { opacity:.8; }
    .btn-primary { background:var(--accent-dim);color:#A5B4FC;border:1px solid rgba(94,106,210,0.3); }
    .btn-secondary { background:rgba(255,255,255,0.04);color:var(--fg-muted);border:1px solid var(--border); }

    /* ── Deal feed ── */
    .deal-feed-empty { padding:2rem;text-align:center;color:var(--fg-subtle);font-size:.83rem;line-height:1.8; }
    .deal-item { display:flex;align-items:flex-start;gap:.75rem;padding:.75rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;margin-bottom:.5rem; }
    .deal-icon { width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem; }
    .deal-icon.sale { background:var(--success-dim); }
    .deal-icon.error { background:var(--warning-dim); }
    .deal-body { flex:1; }
    .deal-title { font-size:.83rem;font-weight:600;color:var(--fg); }
    .deal-meta { font-size:.72rem;color:var(--fg-subtle);margin-top:.15rem; }
    .deal-price { font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--success);white-space:nowrap; }

    /* ── Airline intel table ── */
    .verdict-cell { display:inline-flex; }

    /* ── Footer ── */
    .page-footer { text-align:center;padding-top:1rem;font-size:.73rem;color:var(--fg-subtle);line-height:1.9; }
  </style>
</head>
<body>
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><span class="brand-dot"></span> Flight Hunter</div>
      <div class="brand-title">Utah → England</div>
      <div class="brand-sub">July 2026 · $550 budget</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <button class="nav-item active" data-page="hunt" id="nav-hunt">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    function ta(iso){
      const m=Math.round((Date.now()-new Date(iso))/60000);
      if(m<2) return'just now'; if(m<60) return m+'m ago';
      const h=Math.round(m/60); if(h<24) return h+'h ago';
      return Math.round(h/24)+'d ago';
    }
    function badge(t,c){ return `<span class="badge badge-${c}">${t}</span>`; }
    function atag(a,pref){ return `<span class="atag${pref?' pref':''}">${e(a)}</span>`; }
    function destC(d){ return d==='MAN'?'td-man':d==='LBA'?'td-lba':''; }

    /* ── Sidebar meta ── */
    document.getElementById('last-up').textContent = ta(D.meta.last_updated);

      </div>

      <div class="glass best-card mb">
        <div class="slabel">Current Best Option</div>
        <div class="best-flex">
          <div style="flex:1;min-width:0">

                <td>${badge(e(f.stops),f.stops.startsWith('1')?'green':'gray')}</td>
                <td>${f.rejected?badge('❌ REJECTED','gray'):f.price_numeric<=B?badge('✅ IN BUDGET','green'):badge('⚠ OVER','red')}</td>
              </tr>`).join('')}
          </tbody>
        </table></div>
        <div class="tlegend">
          <span><strong style="color:#A5B4FC">Blue</strong> = Manchester #1</span>
          <span><strong style="color:#C4B5FD">Purple</strong> = Leeds Bradford #2</span>
          <span>Faded = date violation</span>
        </div>
      </div>

      <div class="grid2">
        <div class="glass card-pad">
          <div class="slabel">Budget vs. Market</div>
          ${D.market_bars.map(b=>`
            <div class="bar-row">
              <div class="bar-lbl"><span>${e(b.label)}</span><span>${e(b.price)}</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%"></div></div>
            </div>`).join('')}
          <div class="bar-note">$${B} budget sits far left — every bar exceeds it.</div>
        </div>
        <div class="glass card-pad">
          <div class="slabel">Market Context</div>
          ${D.context_items.map(c=>`<div class="ctx-row"><span>${c.icon}</span><span>${e(c.text)}</span></div>`).join('')}
        </div>
      </div>

      <div class="grid2">
        <div class="glass card-pad">
          <div class="slabel">Price Drop Log</div>
          ${D.price_drops.length===0
            ?'<div class="log-empty">No drops yet.<br>Watching every hour.</div>'
            :D.price_drops.map(p=>`<div class="list-item"><div style="color:var(--success);font-weight:700">↓</div><div><div>${e(p.date)} — $${p.saving} saved</div><div class="item-sub">${e(p.from)} → ${e(p.to)}</div></div></div>`).join('')}
        </div>
        <div class="glass card-pad">
          <div class="slabel">Rejected Flights</div>
          ${D.rejected.map(r=>`<div class="list-item"><div class="item-x">✕</div><div><div>${e(r.flight)}</div><div class="item-sub">${e(r.reason)}</div></div></div>`).join('')}
        </div>
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Strategies to Watch</div>
        ${D.tips.map(t=>`<div class="tip-row"><div>${t.icon}</div><div class="tip-text">${t.text}</div></div>`).join('')}
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Search Now</div>
        <div class="links-grid">
          ${D.search_links.map(l=>`<a class="link-btn" href="${e(l.url)}" target="_blank" rel="noopener">${e(l.label)}</a>`).join('')}
        </div>
      </div>

      <div class="glass table-card">
        <div class="table-bar"><div class="slabel" style="margin:0">Search History</div></div>
        <div class="tscroll"><table>
          <thead><tr><th>#</th><th>Date</th><th>Type</th><th>Cheapest</th><th>Notes</th></tr></thead>
          <tbody>
            ${D.history.map(h=>`
              <tr>
                <td class="td-rank">#${h.run}</td>
                <td style="font-family:var(--mono);font-size:.8rem">${e(h.date)}</td>
                <td>${badge(h.type==='manual'?'Manual':'Auto',h.type==='manual'?'accent':'green')}</td>
                <td class="td-mono over">${e(h.cheapest)}</td>
                <td style="color:var(--fg-muted);font-size:.79rem">${e(h.notes)}</td>
              </tr>`).join('')}
          </tbody>
        </table></div>
      </div>

      <div class="page-footer">
        <span class="live-dot"></span>Hourly scans active &nbsp;·&nbsp;
        <a href="https://claude.ai/code/routines">claude.ai/code/routines</a> &nbsp;·&nbsp;
        <a href="https://github.com/findlayymckeown/Flights">github.com/findlayymckeown/Flights</a><br>
        Last updated: ${new Date(D.meta.last_updated).toLocaleString()} · Run #${D.meta.run_count}
      </div>
    `;

    /* ─────────────────────────────────────────────
       PAGE 2 — DEAL WATCH
    ───────────────────────────────────────────── */
    const deals   = D.deals   || {last_checked:'',items:[]};
    const strats  = D.strategies || [];
    const airlines = D.airlines || [];

    document.getElementById('page-deals').innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow"><span class="dot"></span> Deal Intelligence</div>
        <h1 class="page-h1">Deal <span class="grad">Watch</span></h1>
        <div class="page-sub">Live deal monitoring, route strategies &amp; airline intel</div>
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Live Deal Feed</div>
        ${deals.items.length===0
          ? `<div class="deal-feed-empty">
               🔍 No deals spotted yet.<br>
               The hourly scanner checks <strong style="color:var(--fg)">Going.com</strong>,
               <strong style="color:var(--fg)">Secret Flying</strong> &amp;
               <strong style="color:var(--fg)">Thrifty Traveler</strong> each run.<br>
               <span style="font-size:.75rem;margin-top:.5rem;display:block;color:var(--fg-subtle)">
                 Last checked: ${deals.last_checked ? ta(deals.last_checked) : 'pending first scan'}
               </span>
             </div>`
          : deals.items.map(d=>`
              <div class="deal-item">
                <div class="deal-icon ${d.type}">
                  ${d.type==='error'?'⚡':'🏷'}
                </div>
                <div class="deal-body">
                  <div class="deal-title">${e(d.title)}</div>
                  <div class="deal-meta">${e(d.source)} · ${ta(d.found_at)}</div>
                </div>
                <div class="deal-price">${e(d.price)}</div>
              </div>`).join('')}
        <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap">
          <a class="link-btn" href="https://www.going.com" target="_blank" rel="noopener">Going.com</a>
          <a class="link-btn" href="https://secretflying.com" target="_blank" rel="noopener">Secret Flying</a>
          <a class="link-btn" href="https://thriftytraveler.com/deals/airlines" target="_blank" rel="noopener">Thrifty Traveler</a>
          <a class="link-btn" href="https://airfarewatchdog.com" target="_blank" rel="noopener">Airfare Watchdog</a>
        </div>
      </div>

      <div class="slabel">Route Strategies — ${strats.length} options ranked</div>
      <div class="strategy-grid mb">
        ${strats.map(s=>`
          <div class="glass strat-card">
            <div class="strat-head">
              <div class="strat-name">${e(s.name)}</div>
              ${badge(e(s.tag), s.tag_type)}
            </div>
            <div class="strat-price">${e(s.est_price)}</div>
            <div class="strat-steps">
              ${s.steps.map((st,i)=>`
                <div class="strat-step">
                  <span class="step-n">${i+1}.</span>
                  <span>${e(st)}</span>
                </div>`).join('')}
            </div>
            <div class="strat-procon">
              <div class="pro-list">
                ${s.pros.map(p=>`<div class="pro-item"><span class="pro-icon">✓</span><span>${e(p)}</span></div>`).join('')}
              </div>
              <div class="con-list">
                ${s.cons.map(c=>`<div class="con-item"><span class="con-icon">✗</span><span>${e(c)}</span></div>`).join('')}
              </div>
            </div>
            <div class="strat-action">
              <a href="${e(s.booking_url)}" target="_blank" rel="noopener" class="btn-sm btn-primary">Book →</a>
              <a href="${e(s.check_url)}" target="_blank" rel="noopener" class="btn-sm btn-secondary">Check price</a>
            </div>
          </div>`).join('')}
      </div>

      <div class="glass table-card mb">
        <div class="table-bar"><div class="slabel" style="margin:0">Airline Intelligence — All Carriers Serving This Route</div></div>
        <div class="tscroll"><table>
          <thead><tr><th>Airline</th><th>Hub</th><th>Route</th><th>July Est.</th><th>Stops</th><th>Verdict</th><th>Link</th></tr></thead>
          <tbody>
            ${airlines.map(a=>`
              <tr>
                <td style="font-weight:600">${e(a.name)}</td>
                <td style="font-family:var(--mono);font-size:.78rem;color:var(--fg-muted)">${e(a.hub)}</td>
                <td style="font-size:.8rem;color:var(--fg-muted)">${e(a.routes)}</td>
                <td class="td-mono" style="color:${a.vtype==='green'?'var(--success)':a.vtype==='yellow'?'var(--warning)':'var(--danger)'}">${e(a.july_est)}</td>
                <td>${badge(e(a.stops)+'★', a.stops==='0'?'green':a.stops==='1'?'yellow':'gray')}</td>
                <td>${badge(e(a.verdict), a.vtype)}</td>
                <td><a href="${e(a.url)}" target="_blank" rel="noopener" style="font-size:.75rem">Check →</a></td>
              </tr>`).join('')}
          </tbody>
        </table></div>
        <div class="tlegend"><span>★ stops each way · RT = round trip · OW = one way</span></div>
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Booking Timeline Guidance</div>
        <div class="ctx-row"><span>📉</span><span><strong style="color:var(--fg)">Now (31 days out)</strong> — Past the optimal 40–60 day window. Prices have likely peaked for peak-season travel. Keep watching but prepare for current rates.</span></div>
        <div class="ctx-row"><span>⚡</span><span><strong style="color:var(--fg)">14–21 days out (Jun 10–17)</strong> — Airlines may release unsold inventory at discounted prices. Set alerts and check daily. This is the last realistic hope for a discount.</span></div>
        <div class="ctx-row"><span>⚠️</span><span><strong style="color:var(--fg)">Under 10 days</strong> — Prices typically spike for last-minute bookings on peak routes. Only book here if a specific deal appears.</span></div>
        <div class="ctx-row"><span>🎯</span><span><strong style="color:var(--fg)">Budget reality</strong> — At $550 total, you likely need either an error fare or a budget carrier combo (Norse/PLAY + positioning). Standard carriers all exceed budget by $200–$600+.</span></div>
        <div class="ctx-row"><span>🏆</span><span><strong style="color:var(--fg)">Miles & points</strong> — British Airways Avios, United MileagePlus, Delta SkyMiles, or AA miles could get you on this route for $50–$150 in fees. If you have any miles, check award availability now.</span></div>
      </div>

      <div class="page-footer">
        <span class="live-dot"></span>Deal scanner running hourly &nbsp;·&nbsp;
        <a href="https://claude.ai/code/routines">claude.ai/code/routines</a><br>
        Data refreshed: ${new Date(D.meta.last_updated).toLocaleString()}
      </div>
    `;

    /* ─────────────────────────────────────────────
       NAVIGATION
    ───────────────────────────────────────────── */
    const pages  = document.querySelectorAll('.page');
    const navBtns = document.querySelectorAll('.nav-item[data-page]');

    function showPage(id){
      pages.forEach(p=>p.classList.toggle('active', p.id==='page-'+id));
      navBtns.forEach(b=>b.classList.toggle('active', b.dataset.page===id));
      closeSidebar();
    }
    navBtns.forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));

    /* Mobile sidebar */
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
    function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    document.getElementById('menu-btn').addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
  })();
  </script>
</body>
</html>
