<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Hunter &mdash; Utah to England</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #050C1A;
      --bg-raised:    #0A1628;
      --surface:      rgba(255,255,255,0.04);
      --surface-hover:rgba(255,255,255,0.075);
      --border:       rgba(255,255,255,0.08);
      --border-top:   rgba(255,255,255,0.15);
      --fg:           #F1F5F9;
      --fg-muted:     #94A3B8;
      --fg-subtle:    #475569;
      --primary:      #0EA5E9;
      --primary-dim:  rgba(14,165,233,0.12);
      --primary-glow: rgba(14,165,233,0.3);
      --orange:       #F97316;
      --orange-dim:   rgba(249,115,22,0.12);
      --success:      #10B981;
      --success-dim:  rgba(16,185,129,0.10);
      --danger:       #EF4444;
      --danger-dim:   rgba(239,68,68,0.10);
      --warning:      #F59E0B;
      --warning-dim:  rgba(245,158,11,0.10);
      --sidebar-w:    240px;
      --radius:       16px;
      --radius-sm:    10px;
      --ease:         cubic-bezier(0.16,1,0.3,1);
      --mono:         'Fira Code','SF Mono','Cascadia Code','Consolas',monospace;
      --sans:         'Fira Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    html { color-scheme: dark; }
    body { font-family: var(--sans); background: var(--bg); color: var(--fg); min-height: 100dvh; overflow-x: hidden; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 3px; }

    /* ── Aurora ── */
    .aurora { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .ab { position: absolute; border-radius: 50%; filter: blur(110px); }
    .ab1 { width:600px;height:600px;background:rgba(14,165,233,0.07);top:-200px;left:-150px;animation:drift 26s ease-in-out infinite alternate; }
    .ab2 { width:500px;height:500px;background:rgba(249,115,22,0.05);bottom:-100px;right:-100px;animation:drift 22s ease-in-out infinite alternate-reverse; }
    .ab3 { width:380px;height:380px;background:rgba(16,185,129,0.04);top:50%;left:45%;animation:drift 30s ease-in-out infinite alternate; }
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-30px) scale(1.07)} 100%{transform:translate(-20px,40px) scale(0.96)} }
    @media(prefers-reduced-motion:reduce){ .ab{animation:none} }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: rgba(3,8,16,0.94);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50; transition: transform 280ms var(--ease);
    }
    .main { margin-left: var(--sidebar-w); position: relative; z-index: 1; min-height: 100dvh; }

    /* Brand */
    .sidebar-brand { padding: 1.4rem 1.25rem 1rem; border-bottom: 1px solid var(--border); }
    .brand-logo { display: flex; align-items: center; gap: .55rem; font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--primary); }
    .brand-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: bpulse 2s ease-out infinite; }
    @keyframes bpulse { 0%{box-shadow:0 0 0 0 rgba(16,185,129,0.7)} 70%{box-shadow:0 0 0 8px rgba(16,185,129,0)} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0)} }
    .brand-title { font-size: 1.1rem; font-weight: 800; color: var(--fg); margin-top: .3rem; letter-spacing: -0.3px; }
    .brand-route { font-size: .78rem; color: var(--primary); font-weight: 600; margin-top: .08rem; }
    .brand-sub   { font-size: .7rem; color: var(--fg-subtle); margin-top: .12rem; }

    /* Budget tracker */
    .budget-track { margin: .85rem 1.1rem; padding: .85rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .budget-lbl { display: flex; justify-content: space-between; font-size: .69rem; color: var(--fg-muted); margin-bottom: .5rem; }
    .budget-lbl strong { color: var(--fg); font-family: var(--mono); font-size: .75rem; }
    .budget-outer { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; position: relative; }
    .budget-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,var(--primary),var(--danger)); transition: width .9s var(--ease); }
    .budget-mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: rgba(255,255,255,0.5); border-radius: 1px; }
    .budget-sub  { font-size: .66rem; color: var(--fg-subtle); margin-top: .4rem; text-align: right; }

    /* Nav */
    .sidebar-nav { flex: 1; padding: .5rem .75rem; display: flex; flex-direction: column; gap: .15rem; overflow-y: auto; }
    .nav-section { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--fg-subtle); padding: .7rem .5rem .25rem; }
    .nav-item {
      display: flex; align-items: center; gap: .7rem;
      padding: .62rem .9rem; border-radius: var(--radius-sm);
      font-size: .85rem; font-weight: 500; color: var(--fg-muted);
      background: none; border: 1px solid transparent; cursor: pointer; width: 100%; text-align: left;
      transition: background 150ms var(--ease), color 150ms var(--ease), border-color 150ms var(--ease);
      position: relative;
    }
    .nav-item:hover { background: var(--surface); color: var(--fg); }
    .nav-item.active { background: var(--primary-dim); color: var(--fg); border-color: rgba(14,165,233,0.25); }
    .nav-item.active::before { content:''; position:absolute; left:0; top:25%; bottom:25%; width:3px; background:var(--primary); border-radius:0 2px 2px 0; }
    .nav-item svg { flex-shrink:0; opacity:.6; }
    .nav-item.active svg { opacity:1; color:var(--primary); }

    /* Footer */
    .sidebar-footer { padding: .9rem 1.25rem; border-top: 1px solid var(--border); font-size: .71rem; color: var(--fg-subtle); line-height: 1.8; }
    .live-pill { display:inline-flex; align-items:center; gap:.4rem; background:var(--success-dim); border:1px solid rgba(16,185,129,0.25); border-radius:20px; padding:.18rem .6rem; font-size:.68rem; color:#6EE7B7; font-weight:600; margin-bottom:.35rem; }
    .live-dot { display:inline-block; width:7px; height:7px; background:var(--success); border-radius:50%; animation:bpulse 2s ease-out infinite; }

    /* Mobile */
    .mobile-header { display:none; position:fixed; top:0; left:0; right:0; height:56px; background:rgba(3,8,16,0.97); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); align-items:center; justify-content:space-between; padding:0 1rem; z-index:60; }
    .menu-btn { width:40px; height:40px; border-radius:10px; background:var(--surface); border:1px solid var(--border); color:var(--fg); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .mobile-title { font-size:.95rem; font-weight:800; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:49; }
    @media(max-width:768px){
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .mobile-header { display:flex; }
      .overlay.show { display:block; }
      .main { margin-left:0; padding-top:56px; }
    }

    /* Page */
    .page { display:none; padding:2.5rem 2rem 5rem; max-width:920px; }
    .page.active { display:block; }
    @media(max-width:768px){ .page{padding:1.5rem 1rem 4rem;} }

    /* Page header */
    .page-head { margin-bottom:2rem; }
    .page-eyebrow { display:inline-flex; align-items:center; gap:.5rem; font-size:.67rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--primary); background:var(--primary-dim); border:1px solid rgba(14,165,233,0.25); padding:.25rem .75rem; border-radius:20px; margin-bottom:.8rem; }
    .page-eyebrow .dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:bpulse 2s ease-out infinite; }
    .page-h1 { font-size:clamp(1.7rem,4vw,2.4rem); font-weight:800; letter-spacing:-0.7px; line-height:1.1; }
    .page-h1 .grad { background:linear-gradient(135deg,var(--primary),#38BDF8,var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .page-sub { color:var(--fg-muted); font-size:.9rem; margin-top:.4rem; line-height:1.5; }
    .header-pills { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:1rem; }
    .hpill { font-size:.73rem; padding:.2rem .65rem; background:var(--surface); border:1px solid var(--border); border-radius:20px; color:var(--fg-muted); }

    /* Cards */
    .glass { background:var(--surface); border:1px solid var(--border); border-top-color:var(--border-top); border-radius:var(--radius); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); transition:background 150ms var(--ease),border-color 150ms var(--ease); }
    .glass:hover { background:var(--surface-hover); }
    .card-pad { padding:1.4rem; }
    .mb { margin-bottom:1.1rem; }
    .slabel { font-size:.67rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--fg-subtle); margin-bottom:.85rem; }

    /* Status banner */
    .status-banner { padding:1.4rem 1.6rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:1.2rem; position:relative; overflow:hidden; }
    .status-banner::before { content:''; position:absolute; inset:0; pointer-events:none; }
    .status-banner.over  { border-color:rgba(239,68,68,0.25); }
    .status-banner.over::before  { background:radial-gradient(ellipse at top left,rgba(239,68,68,0.06),transparent 70%); }
    .status-banner.found { border-color:rgba(16,185,129,0.3); }
    .status-banner.found::before { background:radial-gradient(ellipse at top left,rgba(16,185,129,0.06),transparent 70%); }
    .status-icon { width:52px; height:52px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .status-banner.over  .status-icon { background:var(--danger-dim); border:1px solid rgba(239,68,68,0.25); }
    .status-banner.found .status-icon { background:var(--success-dim); border:1px solid rgba(16,185,129,0.3); }
    .status-text h2 { font-size:1rem; font-weight:700; }
    .status-banner.over  .status-text h2 { color:#FCA5A5; }
    .status-banner.found .status-text h2 { color:#6EE7B7; }
    .status-text p { font-size:.82rem; color:var(--fg-muted); margin-top:.25rem; line-height:1.5; }

    /* Stats */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.75rem; margin-bottom:1.1rem; }
    @media(max-width:700px){ .stat-grid{grid-template-columns:1fr 1fr;} }
    .stat-card { padding:1.1rem 1.2rem; }
    .stat-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--fg-subtle); margin-bottom:.35rem; }
    .stat-val { font-family:var(--mono); font-size:1.6rem; font-weight:700; letter-spacing:-1.5px; line-height:1; }
    .stat-val.blue { color:var(--primary); }
    .stat-val.red  { color:var(--danger); }
    .stat-val.yellow { color:var(--warning); }
    .stat-val.green  { color:var(--success); }
    .stat-sub { font-size:.7rem; color:var(--fg-subtle); margin-top:.3rem; }

    /* ── FLIGHT CARDS ── */
    .flight-list-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.9rem; }
    .flight-list-count { font-size:.72rem; color:var(--fg-subtle); font-family:var(--mono); }
    .flight-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-top-color:var(--border-top);
      border-radius:var(--radius);
      margin-bottom:.7rem;
      overflow:hidden;
      cursor:pointer;
      transition:background 150ms var(--ease),border-color 200ms var(--ease),transform 150ms var(--ease),box-shadow 200ms var(--ease);
    }
    .flight-card:hover { background:var(--surface-hover); border-color:rgba(14,165,233,0.3); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 0 1px rgba(14,165,233,0.1); }
    .flight-card:active { transform:translateY(0); }
    .flight-card.rejected { opacity:.45; }
    .flight-card.rejected:hover { opacity:.65; }
    .fc-main { display:flex; align-items:center; gap:.9rem; padding:1rem 1.2rem; }
    .fc-rank { font-family:var(--mono); font-size:.72rem; font-weight:700; color:var(--fg-subtle); width:22px; flex-shrink:0; text-align:center; }
    .fc-rank.gold   { color:#F59E0B; }
    .fc-rank.silver { color:#94A3B8; }
    .fc-rank.bronze { color:#CD7C54; }
    .fc-route { flex:1; min-width:0; }
    .fc-airports { display:flex; align-items:center; gap:.3rem; font-family:var(--mono); font-size:.82rem; font-weight:700; flex-wrap:wrap; }
    .fc-airports .iata { color:var(--fg); }
    .fc-airports .iata.dest-man { color:#7DD3FC; }
    .fc-airports .iata.dest-lba { color:#C4B5FD; }
    .fc-airports .arr { color:var(--fg-subtle); font-size:.7rem; }
    .fc-airline { font-size:.76rem; color:var(--fg-muted); margin-top:.18rem; }
    .fc-meta { display:flex; gap:.75rem; align-items:center; flex-shrink:0; }
    .fc-pill { display:flex; flex-direction:column; align-items:center; min-width:52px; }
    .fc-pill-val { font-family:var(--mono); font-size:.8rem; font-weight:700; color:var(--fg); }
    .fc-pill-lbl { font-size:.59rem; color:var(--fg-subtle); text-transform:uppercase; letter-spacing:.06em; margin-top:.08rem; }
    .fc-price-col { text-align:right; flex-shrink:0; }
    .fc-price { font-family:var(--mono); font-size:1.35rem; font-weight:800; letter-spacing:-1px; line-height:1; }
    .fc-price.over  { color:var(--danger); }
    .fc-price.found { color:var(--success); }
    .fc-badge { margin-top:.28rem; }
    .fc-chevron { width:30px; height:30px; border-radius:8px; background:var(--primary-dim); border:1px solid rgba(14,165,233,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--primary); transition:background 150ms,transform 150ms; }
    .flight-card:hover .fc-chevron { background:var(--primary); color:#fff; transform:translateX(2px); }
    .fc-bar { height:3px; background:rgba(255,255,255,0.04); }
    .fc-bar-fill { height:100%; transition:width .6s var(--ease); }
    .fc-bar-fill.over  { background:linear-gradient(90deg,var(--primary),var(--danger)); }
    .fc-bar-fill.found { background:linear-gradient(90deg,var(--primary),var(--success)); }
    @media(max-width:580px){ .fc-meta{display:none;} }

    /* Best option card */
    .best-card { padding:1.5rem; margin-bottom:1.1rem; position:relative; overflow:hidden; }
    .best-card::after { content:''; position:absolute; top:0; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--primary),transparent); opacity:.4; }
    .best-card::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at top right,rgba(14,165,233,0.04),transparent 65%); pointer-events:none; }
    .route-viz { display:flex; flex-wrap:wrap; align-items:center; gap:.4rem; margin:.6rem 0 .9rem; }
    .atag { font-family:var(--mono); font-size:.78rem; font-weight:700; padding:.22rem .55rem; border-radius:7px; border:1px solid rgba(14,165,233,0.35); background:rgba(14,165,233,0.1); color:#7DD3FC; }
    .atag.pref { border-color:rgba(167,139,250,0.4); background:rgba(124,58,237,0.12); color:#C4B5FD; }
    .rarrow { color:var(--fg-subtle); }
    .chips { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.8rem; }
    .chip { font-size:.73rem; padding:.2rem .6rem; border-radius:20px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--fg-muted); }
    .best-flex { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; }
    .big-price { font-family:var(--mono); font-size:2.5rem; font-weight:800; letter-spacing:-2px; line-height:1; }
    .big-price.over  { color:var(--danger); text-shadow:0 0 40px rgba(239,68,68,0.2); }
    .big-price.found { color:var(--success); text-shadow:0 0 40px rgba(16,185,129,0.2); }
    .price-badge { display:inline-block; margin-top:.4rem; font-size:.7rem; padding:.2rem .6rem; border-radius:20px; font-weight:700; }
    .price-badge.over  { background:var(--danger-dim); border:1px solid rgba(239,68,68,0.3); color:#FCA5A5; }
    .price-badge.found { background:var(--success-dim); border:1px solid rgba(16,185,129,0.3); color:#6EE7B7; }
    .best-notes { font-size:.8rem; color:var(--fg-muted); line-height:1.7; margin-top:.75rem; padding-top:.75rem; border-top:1px solid var(--border); }

    /* Badges */
    .badge { display:inline-flex; align-items:center; gap:.2rem; font-size:.67rem; font-weight:700; padding:.18rem .55rem; border-radius:6px; white-space:nowrap; }
    .badge-red    { background:var(--danger-dim); color:#FCA5A5; border:1px solid rgba(239,68,68,0.25); }
    .badge-green  { background:var(--success-dim); color:#6EE7B7; border:1px solid rgba(16,185,129,0.25); }
    .badge-yellow { background:var(--warning-dim); color:#FDE68A; border:1px solid rgba(245,158,11,0.25); }
    .badge-gray   { background:rgba(255,255,255,0.04); color:var(--fg-subtle); border:1px solid var(--border); }
    .badge-accent { background:var(--primary-dim); color:#7DD3FC; border:1px solid rgba(14,165,233,0.3); }

    /* Grid helpers */
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.1rem; }
    @media(max-width:580px){ .grid2{grid-template-columns:1fr;} }

    /* Market bars */
    .bar-row { margin-bottom:.7rem; }
    .bar-row:last-of-type { margin-bottom:0; }
    .bar-lbl { display:flex; justify-content:space-between; font-size:.73rem; color:var(--fg-muted); margin-bottom:.3rem; }
    .bar-lbl span:last-child { font-family:var(--mono); color:var(--danger); }
    .bar-track { height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--primary),var(--danger)); transition:width .8s var(--ease); }
    .bar-note { font-size:.69rem; color:var(--fg-subtle); margin-top:.55rem; padding-top:.55rem; border-top:1px solid var(--border); }

    /* Context / list rows */
    .ctx-row { display:flex; gap:.6rem; padding:.4rem 0; font-size:.82rem; color:var(--fg-muted); line-height:1.5; border-bottom:1px solid rgba(255,255,255,0.04); }
    .ctx-row:last-child { border-bottom:none; }
    .log-empty { padding:2rem; text-align:center; color:var(--fg-subtle); font-size:.83rem; line-height:1.8; }
    .list-item { display:flex; align-items:flex-start; gap:.65rem; padding:.65rem 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:.83rem; }
    .list-item:last-child { border-bottom:none; }
    .item-x { color:var(--danger); font-weight:700; flex-shrink:0; }
    .item-sub { font-size:.73rem; color:var(--fg-subtle); margin-top:.12rem; }
    .tip-row { display:flex; gap:.65rem; padding:.55rem 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:.83rem; align-items:flex-start; }
    .tip-row:last-child { border-bottom:none; }
    .tip-text { color:var(--fg-muted); line-height:1.65; }
    .tip-text strong { color:var(--fg); }

    /* Links */
    .links-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:.45rem; }
    .link-btn { display:block; padding:.55rem .9rem; text-align:center; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--primary); font-size:.8rem; font-weight:500; transition:background 150ms,border-color 150ms,transform 100ms; cursor:pointer; }
    .link-btn:hover { background:var(--primary-dim); border-color:rgba(14,165,233,0.4); transform:translateY(-1px); text-decoration:none; }

    /* Tables (used in deals/history pages) */
    .table-card { margin-bottom:1.1rem; overflow:hidden; }
    .table-bar { padding:.9rem 1.3rem .75rem; border-bottom:1px solid var(--border); }
    .tscroll { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:520px; }
    thead th { padding:.55rem .9rem; text-align:left; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--fg-subtle); background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); }
    tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 120ms var(--ease); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface-hover); }
    tbody tr.dim { opacity:.4; }
    tbody td { padding:.7rem .9rem; font-size:.84rem; vertical-align:middle; }
    .td-mono { font-family:var(--mono); font-weight:700; font-size:.9rem; }
    .td-mono.over  { color:var(--danger); }
    .td-mono.found { color:var(--success); }

    .dg-header { background:rgba(255,255,255,0.04); padding:.4rem .3rem; text-align:center; border-radius:4px; font-weight:700; color:var(--fg-subtle); font-family:var(--mono); }

  (function(){
    const D   = window.FLIGHT_DATA;

    function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function ta(iso){
      const m=Math.round((Date.now()-new Date(iso))/60000);
      if(m<2)return'just now';if(m<60)return m+'m ago';
      const h=Math.round(m/60);if(h<24)return h+'h ago';
      return Math.round(h/24)+'d ago';
    }
    function badge(t,c){ return `<span class="badge badge-${c}">${t}</span>`; }
    function atag(a,pref){ return `<span class="atag${pref?' pref':''}">${e(a)}</span>`; }
    function destC(d){ return d==='MAN'?'td-man':d==='LBA'?'td-lba':''; }

    /* sidebar meta */
    document.getElementById('last-up').textContent = ta(D.meta.last_updated);
    document.getElementById('run-count').textContent = D.meta.run_count;

    /* budget bar */
    if(St.closest_price){
      document.getElementById('budget-val').textContent = St.closest_price_display || ('$'+St.closest_price);
      const fillPct = Math.min((St.closest_price / (St.closest_price * 1.3)) * 100, 100);
      document.getElementById('budget-fill').style.width = '100%';
      const markPct = Math.min((B / St.closest_price) * 100, 100);
      document.getElementById('budget-mark').style.left = markPct + '%';
    }

    /* ── MODAL ── */
    const mOverlay = document.getElementById('modal-overlay');
    function openModal(html, title, rank){
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal-title').textContent = title || 'Flight Details';
      document.getElementById('modal-rank').textContent = rank ? 'Option #'+rank : '';
      mOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(){
      mOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    mOverlay.addEventListener('click', ev => { if(ev.target===mOverlay) closeModal(); });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.addEventListener('keydown', ev => { if(ev.key==='Escape') closeModal(); });

    /* build flight card DOM node */
    function mkCard(f, budget){
      const over = f.price_numeric > budget;
      const pct  = Math.min(Math.round((f.price_numeric / budget)*100), 200);
      const airports = (f.route||'').split('→').map(s=>s.trim()).filter(Boolean);
      const destIata = f.dest || airports[Math.floor(airports.length/2)];
      const routeHtml = airports.map((a,i)=>{
        const cls = a===destIata ? (destIata==='LBA'?'iata dest-lba':'iata dest-man') : 'iata';
        return (i>0?'<span class="arr">→</span>':'')+`<span class="${cls}">${e(a)}</span>`;
      }).join('');
      const rankCls = f.rank===1?'gold':f.rank===2?'silver':f.rank===3?'bronze':'';

      const div = document.createElement('div');
      div.className = 'flight-card' + (f.rejected?' rejected':'');
      div.setAttribute('role','button'); div.setAttribute('tabindex','0');
      div.setAttribute('aria-label', `${f.route} — ${f.price_display}`);
      div.innerHTML = `
        <div class="fc-main">
          <div class="fc-rank ${rankCls}">${f.rank||'—'}</div>
          <div class="fc-route">
            <div class="fc-airports">${routeHtml}</div>
            <div class="fc-airline">${e(f.airline)}${f.ref_dates?` &nbsp;&middot;&nbsp; <span style="color:var(--fg-subtle)">${e(f.ref_dates)}</span>`:''}</div>
          </div>
          <div class="fc-meta">
            <div class="fc-pill">
              <div class="fc-pill-val">${e(f.stops)}</div>
              <div class="fc-pill-lbl">Stops</div>
            </div>
          </div>
          <div class="fc-price-col">
            <div class="fc-price ${over?'over':'found'}">${e(f.price_display)}</div>
            <div class="fc-badge">${f.rejected?badge('Rejected','gray'):over?badge('⚠ Over','red'):badge('✓ Budget','green')}</div>
          </div>
          <div class="fc-chevron">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <div class="fc-bar"><div class="fc-bar-fill ${over?'over':'found'}" style="width:${Math.min(pct,100)}%"></div></div>`;

      function open(){
        const strats = D.strategies || [];
        const al     = (f.airline||'').toLowerCase();
        const strat  = strats.find(s=>{
          const n=s.name.toLowerCase();
          return (n.includes('icelandair')&&al.includes('icelandair'))||
                 (n.includes('norse')&&al.includes('norse'))||
                 (n.includes('play')&&al.includes('play'))||
                 (n.includes('aer lingus')&&al.includes('aer lingus'));
        });
        const notes = f.notes || (f.rank===1 && bo ? bo.notes : null);
        openModal(buildModal(f, budget, strat, notes), f.airline, f.rank);
      }
      div.addEventListener('click', open);
      div.addEventListener('keydown', ev=>{ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); open(); } });
      return div;
    }

    /* build modal HTML string */
    function buildModal(f, budget, strat, notes){
      const over   = f.price_numeric > budget;
      const pct    = Math.round((f.price_numeric / budget)*100);
      const markPct= Math.min(Math.round((budget/f.price_numeric)*100), 99);
      const airports= (f.route||'').split('→').map(s=>s.trim()).filter(Boolean);
      const dest    = f.dest || airports[Math.floor(airports.length/2)];

      const routeHtml = airports.map((a,i)=>{
        const cls = a===dest ? 'modal-iata dest' : 'modal-iata';
        return (i>0?'<span class="modal-arr">→</span>':'')+`<span class="${cls}">${e(a)}</span>`;
      }).join('');

      const rejHtml = f.rejected
        ? `<div class="modal-rejected"><strong>Rejected:</strong> ${e(f.reject_reason||'Does not meet trip requirements')}</div>`
        : '';

      const stepsHtml = strat ? `
        <div class="modal-sec">
          <div class="modal-sec-title">How to book this route</div>
          ${strat.steps.map((s,i)=>`<div style="display:flex;gap:.6rem;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.82rem;color:var(--fg-muted)"><span style="font-family:var(--mono);font-size:.7rem;color:var(--fg-subtle);flex-shrink:0">${i+1}.</span><span>${e(s)}</span></div>`).join('')}
        </div>` : '';

      const pcHtml = strat ? `
        <div class="modal-sec">
          <div class="modal-sec-title">Pros &amp; Cons</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div>${strat.pros.map(p=>`<div class="pro-item"><span class="pro-icon">&#10003;</span><span>${e(p)}</span></div>`).join('')}</div>
            <div>${strat.cons.map(c=>`<div class="con-item"><span class="con-icon">&#10007;</span><span>${e(c)}</span></div>`).join('')}</div>
          </div>
        </div>` : '';

      const bookBtn = f.booking_url
        ? `<a href="${e(f.booking_url)}" target="_blank" rel="noopener" class="btn-book">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Book this flight
           </a>`
        : '';
      const dep = airports[0]||'SLC';
      const kayakUrl = `https://www.kayak.com/flights/${e(dep)}-${e(dest)}/2026-07-01/2026-07-15`;

      return `
        ${rejHtml}
        <div class="modal-sec">
          <div class="modal-sec-title">Route</div>
          <div class="modal-route">${routeHtml}</div>
          <div style="font-size:.8rem;color:var(--fg-muted)">${e(f.airline)}</div>
        </div>
        <div class="modal-sec">
          <div class="modal-sec-title">Flight details</div>
          <div class="modal-dg">
            <div class="modal-d">
              <div class="modal-d-lbl">Price</div>
              <div class="modal-d-val lg ${over?'over':'found'}">${e(f.price_display)}</div>
            </div>
            <div class="modal-d">
              <div class="modal-d-lbl">vs. Budget ($${budget})</div>
              <div class="modal-d-val" style="color:${over?'var(--danger)':'var(--success)'}">
                ${over?'⚠ $'+(f.price_numeric-budget)+' over':'&#10003; Within limit'}
              </div>
            </div>
            <div class="modal-d">
              <div class="modal-d-lbl">Stops</div>
              <div class="modal-d-val">${e(f.stops)}</div>
            </div>
            <div class="modal-d">
              <div class="modal-d-lbl">Destination</div>
              <div class="modal-d-val">${e(dest)}</div>
            </div>
            ${f.ref_dates?`<div class="modal-d"><div class="modal-d-lbl">Ref. Dates</div><div class="modal-d-val" style="font-size:.78rem">${e(f.ref_dates)}</div></div>`:''}
            ${f.travel_time?`<div class="modal-d"><div class="modal-d-lbl">Duration</div><div class="modal-d-val" style="font-size:.78rem">${e(f.travel_time)}</div></div>`:''}
          </div>
          <div class="modal-bbar">
            <div class="modal-bbar-lbls"><span>$0</span><span style="color:var(--fg)">Budget $${budget}</span><span>${e(f.price_display)}</span></div>
            <div class="modal-bbar-outer">
              <div class="modal-bbar-fill ${over?'over':'found'}" style="width:${Math.min(pct,100)}%"></div>
              <div class="modal-bbar-mark" style="left:${markPct}%"></div>
            </div>
            <div class="modal-bbar-pct">${pct}% of budget${over?' — $'+(f.price_numeric-budget)+' over limit':' — within limit'}</div>
          </div>
        </div>
        ${notes?`<div class="modal-sec"><div class="modal-sec-title">Notes</div><div class="modal-notes">${notes}</div></div>`:''}
        ${stepsHtml}
        ${pcHtml}
        <div class="modal-ctas">
          ${bookBtn}
          <a href="${kayakUrl}" target="_blank" rel="noopener" class="btn-kayak">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Check on Kayak
          </a>
        </div>`;
    }

      <div id="cards-main" class="mb"></div>

      <div class="page-footer">
        <span class="live-dot"></span>Deal scanner active &nbsp;&bull;&nbsp;
        <a href="https://claude.ai/code/routines">claude.ai/code/routines</a><br>
        Data refreshed: ${new Date(D.meta.last_updated).toLocaleString()}
      </div>`;

    /* ─────────────────────────────────────────────
       PAGE 3 — BOYS TRIP
    ───────────────────────────────────────────── */
    const BT  = D.boys_trip || {};
    const BTt = BT.trip  || {};
    const BTs = BT.status || {};
    const budgetB = BTt.budget_usd || 550;
    const neverRun = BT.meta && BT.meta.run_count === 0;
    const boysFlights = BT.flights || [];

    const boysEl = document.getElementById('page-boys');
    boysEl.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow"><span class="dot"></span> Boys Trip</div>
        <h1 class="page-h1"><span class="grad">Boys Trip</span></h1>
        <div class="page-sub">Utah &rarr; England &bull; ${e(BTt.ideal_depart||'Jul 7')} &rarr; ${e(BTt.ideal_return||'Jul 15, 2026')}</div>
        <div class="header-pills">
          <span class="hpill">Depart ~${e(BTt.ideal_depart||'Jul 7')}</span>
          <span class="hpill">Return ${e(BTt.ideal_return||'Jul 15')}</span>
          <span class="hpill">Arrive by ${e(BTt.must_arrive_by||'Jul 9')}</span>
          <span class="hpill">Budget $${budgetB}</span>
          <span class="hpill">${BTs.days_to_departure} days away</span>
        </div>
      </div>

      <div class="glass status-banner ${BTs.found_qualifying?'found':'over'} mb" style="${neverRun?'border-color:rgba(14,165,233,0.3);':''}">
        <div class="status-icon" style="${neverRun?'background:var(--primary-dim);border-color:rgba(14,165,233,0.3);':''}">${neverRun?'&#128269;':BTs.found_qualifying?'&#10003;':'&#8987;'}</div>
        <div class="status-text">
          <h2 style="${neverRun?'color:#7DD3FC;':''}">${neverRun?'First scan pending &mdash; results appear within the hour':BTs.found_qualifying?'QUALIFYING FLIGHT FOUND &mdash; BOOK NOW':`No qualifying flight under $${budgetB} yet`}</h2>
          <p>${neverRun?`Searching Jul 7&ndash;15 departures &bull; Budget $${budgetB}`:`Closest: <strong style="color:var(--fg)">${e(BTs.closest_price_display||'Not yet searched')}</strong>${BTs.budget_gap!=null?' &bull; Gap: ~$'+BTs.budget_gap:''} &bull; ${BTs.days_to_departure} days out`}</p>
        </div>
      </div>

      <div class="stat-grid">
        <div class="glass stat-card"><div class="stat-label">Budget</div><div class="stat-val blue">$${budgetB}</div><div class="stat-sub">All-in max</div></div>
        <div class="glass stat-card"><div class="stat-label">Closest Found</div><div class="stat-val ${neverRun?'blue':'red'}">${e(BTs.closest_price_display||'—')}</div><div class="stat-sub">${neverRun?'Pending':'Est. total'}</div></div>
        <div class="glass stat-card"><div class="stat-label">Budget Gap</div><div class="stat-val ${BTs.budget_gap==null?'blue':'yellow'}">${BTs.budget_gap==null?'—':'~$'+BTs.budget_gap}</div><div class="stat-sub">Pending</div></div>
        <div class="glass stat-card"><div class="stat-label">Days Out</div><div class="stat-val ${BTs.days_to_departure<=21?'red':'yellow'}">${BTs.days_to_departure}</div><div class="stat-sub">Until Jul 7</div></div>
      </div>

      <div class="glass card-pad mb" style="border-color:rgba(14,165,233,0.2);background:var(--primary-dim);">
        <div class="slabel" style="color:var(--primary)">Trip Notes</div>
        <div class="ctx-row"><span>&#128197;</span><span><strong style="color:var(--fg)">Tuesday departure (Jul 7)</strong> &mdash; Weekdays typically 10&ndash;15% cheaper than weekends.</span></div>
        <div class="ctx-row"><span>&#128146;</span><span><strong style="color:var(--fg)">One wedding only</strong> &mdash; Arrive by Jul 9, attend Jul 10 wedding, depart Jul 15.</span></div>
        <div class="ctx-row"><span>&#10003;</span><span><strong style="color:var(--fg)">Valid window</strong> &mdash; Jul 6, 7, or 8 departure all work (arrive Jul 7&ndash;9, before Jul 10 wedding).</span></div>
      </div>

      <div id="cards-boys" class="mb"></div>

      ${boysFlights.length===0?`<div class="glass card-pad mb log-empty" style="padding:2rem;text-align:center">No flights found yet &mdash; hourly scanner will populate this automatically.</div>`:''}

      <div class="glass card-pad mb">
        <div class="slabel">Search Links &mdash; Jul 7 &rarr; Jul 15 Pre-Filled</div>
        <div class="links-grid">
          ${(BT.search_links||[]).map(l=>`<a class="link-btn" href="${e(l.url)}" target="_blank" rel="noopener">${e(l.label)}</a>`).join('')}
        </div>
      </div>

      <div class="page-footer">
        <span class="live-dot"></span>Scans active &nbsp;&bull;&nbsp;
        <a href="https://github.com/findlayymckeown/Flights">github.com/findlayymckeown/Flights</a>
      </div>`;

    if(boysFlights.length){
      const bc = boysEl.querySelector('#cards-boys');
      bc.innerHTML = `<div class="flight-list-head"><div class="slabel" style="margin:0">Flights Found &mdash; Cheapest First</div><div class="flight-list-count">${boysFlights.length} routes</div></div>`;
      renderCards(boysFlights, budgetB, bc);
    }

    /* ─────────────────────────────────────────────
       PAGE 4 — DATE FINDER
    ───────────────────────────────────────────── */
    const dm  = D.date_matrix  || {valid:[],depart_options:[],return_options:[]};
    const ag  = D.airport_guide || [];
    const priceMap = {};
    (dm.valid||[]).forEach(v=>{ priceMap[v.dep+'|'+v.ret]=v; });
    const depOpts = dm.depart_options || [];
    const retOpts = dm.return_options || [];
    const isIdeal = (d,r) => d==='Jul 1'&&r==='Jul 15';

    let gridHTML = '<div class="date-grid">';
    gridHTML += '<div class="dg-header">Depart &darr; / Return &rarr;</div>';
    retOpts.forEach(r=>gridHTML+=`<div class="dg-header">${e(r)}</div>`);
    depOpts.forEach(dep=>{
      gridHTML+=`<div class="dg-dep">${e(dep)}</div>`;
      retOpts.forEach(ret=>{
        const cell=priceMap[dep+'|'+ret];
        if(!cell){ gridHTML+='<div class="dg-cell invalid">&#10005;</div>'; }
        else if(cell.price_est){ gridHTML+=`<div class="dg-cell ${cell.price_est<=B?'found':'checked'}" title="${e(cell.notes||'')}">$${cell.price_est}</div>`; }
        else { gridHTML+=`<div class="dg-cell ${isIdeal(dep,ret)?'ideal':'unchecked'}" title="${e(cell.notes||'')} (${cell.days} days)">${isIdeal(dep,ret)?'&#9733;':'&mdash;'}</div>`; }
      });
    });
    gridHTML += '</div>';
    gridHTML += `<div class="dg-legend">
      <span><span class="dg-swatch" style="background:rgba(16,185,129,0.3)"></span>Under $550</span>
      <span><span class="dg-swatch" style="background:rgba(239,68,68,0.2)"></span>Over budget</span>
      <span><span class="dg-swatch" style="background:var(--primary-dim)"></span>Ideal dates</span>
      <span><span class="dg-swatch" style="background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1)"></span>Invalid</span>
    </div>`;

    const maxDist = 215;
    let distHTML = '<div class="dist-bar-wrap">';
    ag.forEach(a=>{
      const pct = Math.round((a.miles_from_leeds/maxDist)*100);
      const col = a.verdict_type==='green'?'var(--success)':a.verdict_type==='yellow'?'var(--warning)':'var(--danger)';
      distHTML+=`<div class="dist-row"><div class="dist-code">${e(a.code)}</div><div class="dist-bar-outer"><div class="dist-bar-inner" style="width:${pct}%;background:${col}"></div></div><div class="dist-label">${a.miles_from_leeds} mi</div><div class="dist-train">&#128650; ${a.train_mins}m</div></div>`;
    });
    distHTML += '</div>';

    const bookingLinks = [
      {name:"Google Flights",route:"SLC&rarr;MAN",url:"https://www.google.com/travel/flights",note:"Jul 1&rarr;15 flexible"},
      {name:"Kayak DEN&rarr;MAN",route:"DEN&rarr;MAN Jul 1&ndash;15",url:"https://www.kayak.com/flights/DEN-MAN/2026-07-01/2026-07-15",note:"Icelandair route"},
      {name:"Kayak SLC&rarr;MAN",route:"SLC&rarr;MAN Jul 1&ndash;15",url:"https://www.kayak.com/flights/SLC-MAN/2026-07-01/2026-07-15",note:"All airlines"},
      {name:"Kayak SLC&rarr;LHR",route:"SLC&rarr;LHR Jul 1&ndash;15",url:"https://www.kayak.com/flights/SLC-LHR/2026-07-01/2026-07-15",note:"London Heathrow"},
      {name:"Skyscanner",route:"SLC&rarr;UK flexible",url:"https://www.skyscanner.com/transport/flights/slc/uk/20260701/20260715/",note:"Any UK airport"},
      {name:"Momondo",route:"SLC&rarr;MAN",url:"https://www.momondo.com/flights/salt-lake-city/manchester/2026-07-01/2026-07-15",note:"Price comparison"},
      {name:"Icelandair",route:"DEN&rarr;MAN direct",url:"https://www.icelandair.com/us/book/flights/?from=DEN&to=MAN&departure=2026-07-01&return=2026-07-15&adults=1&class=economy",note:"Best structural option"},
      {name:"Norse Atlantic",route:"JFK&rarr;LGW",url:"https://flights.flynorse.com/en-us/",note:"Budget transatlantic"},
      {name:"PLAY Airlines",route:"US&rarr;LPL/STN",url:"https://www.flyplay.com/en-us/cheap-flights-from-united-states",note:"Via Reykjavik"},
      {name:"Kiwi.com",route:"Self-transfer combos",url:"https://www.kiwi.com/us/search/tiles/SLC/MAN/2026-07-01/2026-07-15?adults=1",note:"Multi-carrier"},
    ];

    document.getElementById('page-dates').innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow"><span class="dot"></span> Date Intelligence</div>
        <h1 class="page-h1">Date <span class="grad">Finder</span></h1>
        <div class="page-sub">All valid combinations &bull; Airport distances &bull; Direct booking links</div>
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Valid Date Combinations</div>
        <div style="font-size:.78rem;color:var(--fg-muted);margin-bottom:.75rem;line-height:1.6">
          Hard rules: <strong style="color:var(--fg)">arrive by Jul 3</strong> &bull;
          <strong style="color:var(--fg)">leave no earlier than Jul 10</strong> &bull;
          <strong style="color:var(--fg)">8&ndash;15 days</strong> &bull;
          <span style="color:var(--primary)">&#9733; = your ideal dates</span>
        </div>
        ${gridHTML}
      </div>

      <div class="grid2">
        <div class="glass card-pad">
          <div class="slabel">Airport Distance from Leeds</div>
          ${distHTML}
          <div style="font-size:.69rem;color:var(--fg-subtle);margin-top:.5rem">Bars show road distance. Clock = train time to Leeds. MAN &amp; LBA are closest.</div>
        </div>
        <div class="glass card-pad">
          <div class="slabel">Airport Quick Reference</div>
          ${ag.map(a=>`<div class="dist-row" style="align-items:flex-start;gap:.6rem;padding:.5rem 0">
            <div style="min-width:36px"><div style="font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--primary)">${e(a.code)}</div><div>${{green:'&#128994;',yellow:'&#128993;',red:'&#128308;'}[a.verdict_type]||''}</div></div>
            <div><div style="font-size:.8rem;font-weight:600">${e(a.name)}</div><div style="font-size:.72rem;color:var(--fg-muted);margin-top:.1rem">${e(a.notes)}</div></div>
          </div>`).join('')}
        </div>
      </div>

      <div class="glass card-pad mb">
        <div class="slabel">Direct Booking Links &mdash; Dates Pre-Filled</div>
        <div style="font-size:.77rem;color:var(--fg-muted);margin-bottom:.75rem">Links use Jul 1 &rarr; Jul 15. Change dates in the booking site if needed.</div>
        <div class="booking-links-grid">
          ${bookingLinks.map(l=>`<a class="booking-link-card" href="${e(l.url)}" target="_blank" rel="noopener"><div class="blc-name">${l.name}</div><div class="blc-route">${l.route}</div><div class="blc-note">${l.note}</div></a>`).join('')}
        </div>
      </div>

      <div class="glass card-pad">
        <div class="slabel">What to do if Over Budget</div>
        <div class="ctx-row"><span>&#128161;</span><span><strong style="color:var(--fg)">Widen dates:</strong> Try Jun 28 or Jun 29 departure &mdash; avoids the Jul 1 holiday surge. Could save $50&ndash;$150.</span></div>
        <div class="ctx-row"><span>&#128256;</span><span><strong style="color:var(--fg)">Accept London:</strong> LGW via Norse Atlantic is cheapest total combo. Overnight train to Leeds is doable.</span></div>
        <div class="ctx-row"><span>&#127942;</span><span><strong style="color:var(--fg)">Award seats:</strong> BA Avios, United MileagePlus, Delta SkyMiles &mdash; economy awards often cost just &pound;100&ndash;&pound;200 in fees.</span></div>
        <div class="ctx-row"><span>&#128222;</span><span><strong style="color:var(--fg)">Call Icelandair:</strong> +1-800-223-5500 &mdash; occasionally unpublished fares. Ask for lowest July fare DEN&ndash;MAN.</span></div>
      </div>

      <div class="page-footer">
        <span class="live-dot"></span>Date matrix prices filled in automatically each scan &nbsp;&bull;&nbsp;
        <a href="https://github.com/findlayymckeown/Flights">github.com/findlayymckeown/Flights</a>
      </div>`;

    /* ── NAVIGATION ── */
    const pages   = document.querySelectorAll('.page');
    const navBtns = document.querySelectorAll('.nav-item[data-page]');
    function showPage(id){
      pages.forEach(p=>p.classList.toggle('active',p.id==='page-'+id));
      navBtns.forEach(b=>b.classList.toggle('active',b.dataset.page===id));
      closeSidebar();
    }
    navBtns.forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));

    /* Mobile sidebar */
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
    function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    document.getElementById('menu-btn').addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
  })();
  </script>

</body>
</html>
