<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Tracker — Utah to England</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:2rem 1rem}
    .container{max-width:960px;margin:0 auto}
    .header{text-align:center;margin-bottom:2rem}
    .header h1{font-size:2rem;font-weight:700;letter-spacing:-0.5px;color:#f8fafc}
    .header h1 span{color:#60a5fa}
    .header .subtitle{color:#94a3b8;margin-top:.4rem;font-size:.95rem}
    .header .meta{display:flex;justify-content:center;gap:1.5rem;margin-top:.75rem;font-size:.82rem;color:#64748b;flex-wrap:wrap}
    .status-banner{border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
    .status-banner.over{background:#1e1010;border:1px solid #7f1d1d}
    .status-banner.found{background:#0d1f14;border:1px solid #14532d}
    .status-icon{font-size:2rem;flex-shrink:0}
    .status-text h2{font-size:1.1rem;font-weight:700}
    .status-banner.over .status-text h2{color:#fca5a5}
    .status-banner.found .status-text h2{color:#86efac}
    .status-text p{font-size:.85rem;color:#94a3b8;margin-top:.2rem}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    @media(max-width:640px){.grid-2{grid-template-columns:1fr}}
    .card{background:#1e2433;border:1px solid #2d3748;border-radius:12px;padding:1.25rem}
    .card-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:.9rem}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
    .stat{background:#161b27;border-radius:8px;padding:.75rem}
    .stat-label{font-size:.72rem;color:#64748b;margin-bottom:.2rem}
    .stat-value{font-size:1.05rem;font-weight:600;color:#e2e8f0}
    .stat-value.blue{color:#60a5fa}.stat-value.yellow{color:#fbbf24}.stat-value.red{color:#f87171}.stat-value.green{color:#34d399}
    .best-card{background:#1e2433;border:1px solid #2d3748;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
    .route-viz{font-size:1.1rem;font-weight:700;color:#f8fafc;margin:.5rem 0;letter-spacing:-.3px;display:flex;flex-wrap:wrap;align-items:center;gap:.3rem}
    .atag{font-size:.72rem;font-weight:700;color:#60a5fa;background:#1e3a5f;border-radius:4px;padding:.1rem .35rem}
    .atag.pref{color:#a78bfa;background:#2e1a5e}
    .arrow{color:#60a5fa}
    .pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
    .pill{font-size:.75rem;padding:.2rem .65rem;border-radius:20px;font-weight:500}
    .pill-blue{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8}
    .pill-gray{background:#1f2937;color:#9ca3af;border:1px solid #374151}
    .pill-yellow{background:#2d1f00;color:#fbbf24;border:1px solid #92400e}
    .big-price{font-size:2.2rem;font-weight:800;letter-spacing:-1px}
    .big-price.over{color:#f87171}.big-price.ok{color:#34d399}
    .price-sub{font-size:.8rem;color:#64748b;margin-top:.1rem}
    .table-wrap{background:#1e2433;border:1px solid #2d3748;border-radius:12px;overflow:hidden;margin-bottom:1rem}
    .table-header{padding:1rem 1.25rem .75rem;border-bottom:1px solid #2d3748;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#64748b}
    table{width:100%;border-collapse:collapse}
    thead th{padding:.6rem 1rem;text-align:left;font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;background:#161b27;border-bottom:1px solid #2d3748}
    tbody tr{border-bottom:1px solid #1a2030;transition:background .15s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#242b3d}
    tbody tr.rejected-row{opacity:.5}
    tbody td{padding:.8rem 1rem;font-size:.875rem;vertical-align:middle}
    .td-price{font-weight:700;font-size:.95rem;white-space:nowrap}
    .td-price.over{color:#f87171}.td-price.ok{color:#34d399}
    .badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:600;padding:.18rem .55rem;border-radius:6px;white-space:nowrap}
    .badge-red{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d}
    .badge-green{background:#0d1f14;color:#34d399;border:1px solid #14532d}
    .badge-yellow{background:#2d1f00;color:#fbbf24;border:1px solid #92400e}
    .badge-gray{background:#1f2937;color:#6b7280;border:1px solid #374151}
    .badge-blue{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8}
    .log-empty{padding:2rem;text-align:center;color:#475569;font-size:.85rem}
    .rejected-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid #1a2030;font-size:.85rem}
    .rejected-item:last-child{border-bottom:none}
    .rejected-icon{color:#f87171;flex-shrink:0}
    .rejected-reason{color:#64748b;font-size:.78rem;margin-top:.2rem}
    .link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem}
    .link-btn{display:block;padding:.6rem .9rem;background:#161b27;border:1px solid #2d3748;border-radius:8px;color:#93c5fd;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .15s;text-align:center}
    .link-btn:hover{background:#1e3a5f;border-color:#1d4ed8}
    .tip{display:flex;gap:.75rem;padding:.65rem 0;border-bottom:1px solid #1a2030;font-size:.84rem;align-items:flex-start}
    .tip:last-child{border-bottom:none}
    .tip-text{color:#94a3b8}
    .tip-text strong{color:#e2e8f0}
    .footer{text-align:center;margin-top:2.5rem;font-size:.78rem;color:#334155}
    .mb-1{margin-bottom:1rem}
    .market-bar-label{display:flex;justify-content:space-between;font-size:.75rem;color:#64748b;margin-bottom:.3rem}
    .market-bar{height:8px;background:#161b27;border-radius:4px;overflow:hidden;margin-bottom:.6rem}
    .market-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#dc2626)}
    a{color:#60a5fa}
    .ctx-item{display:flex;gap:.5rem;font-size:.82rem;color:#94a3b8;line-height:1.7}
    .update-pulse{display:inline-block;width:8px;height:8px;background:#34d399;border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<!-- DATA_START -->

<script>
(function(){
  const D = window.FLIGHT_DATA;
  const $ = id => document.getElementById(id);
  const budget = D.trip.budget_usd;

  function destColor(dest) {
    if (dest === 'MAN') return '#60a5fa';
    if (dest === 'LBA') return '#a78bfa';
    return '#94a3b8';
  }

  function airportTag(code, preferred) {
    const cls = (code === D.best_option.preferred_dest) ? 'atag pref' : 'atag';
    return `<span class="${cls}">${code}</span>`;
  }

  function badge(text, type) {
    return `<span class="badge badge-${type}">${text}</span>`;
  }

  function timeAgo(iso) {
    const d = new Date(iso), now = new Date();
    const mins = Math.round((now - d) / 60000);
    if (mins < 2) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.round(hrs/24)}d ago`;
  }

  const html = `
    <div class="header">
      <h1>✈ Utah <span>→</span> England</h1>
      <div class="subtitle">Flight Tracker — July 2026 Weddings</div>
      <div class="meta">
        <span>📅 Must arrive by ${D.trip.must_arrive_by}</span>
        <span>💒 Weddings: ${D.trip.weddings.join(' & ')}</span>
        <span>🏠 Depart no earlier than ${D.trip.must_leave_after}</span>
        <span>💰 Budget: $${budget}</span>
      </div>
    </div>

    <div class="status-banner ${D.status.found_qualifying ? 'found' : 'over'}">
      <div class="status-icon">${D.status.found_qualifying ? '✅' : '⚠️'}</div>
      <div class="status-text">
        <h2>${D.status.found_qualifying
          ? 'QUALIFYING FLIGHT FOUND — BOOK NOW'
          : `No qualifying flight found under $${budget}`}</h2>
        <p>Closest: ${D.status.closest_price_display} &nbsp;·&nbsp; Budget gap: ~$${D.status.budget_gap} &nbsp;·&nbsp;
          <span class="update-pulse"></span>Last updated ${timeAgo(D.meta.last_updated)} &nbsp;·&nbsp; ${D.meta.run_count} search run${D.meta.run_count !== 1 ? 's' : ''} &nbsp;·&nbsp; Automated hourly scans active</p>
      </div>
    </div>

    <div class="grid-2 mb-1">
      <div class="card">
        <div class="card-title">Snapshot</div>
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">Budget</div><div class="stat-value blue">$${budget}</div></div>
          <div class="stat"><div class="stat-label">Market Floor (Jul est.)</div><div class="stat-value red">~$790</div></div>
          <div class="stat"><div class="stat-label">Budget Gap</div><div class="stat-value yellow">~$${D.status.budget_gap}</div></div>
          <div class="stat"><div class="stat-label">Days to Departure</div><div class="stat-value yellow">${D.status.days_to_departure}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Market Context</div>
        ${D.context_items.map(c => `<div class="ctx-item"><span>${c.icon}</span><span>${c.text}</span></div>`).join('')}
      </div>
    </div>

    <div class="best-card mb-1">
      <div class="card-title">Current Best Option</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
        <div>
          <div class="route-viz">
            ${D.best_option.route_airports.map((a,i,arr) =>
              airportTag(a) + (i < arr.length-1 ? '<span class="arrow">→</span>' : '')
            ).join('')}
          </div>
          <div class="pills">
            <span class="pill pill-blue">${D.best_option.airlines}</span>
            <span class="pill pill-yellow">${D.best_option.stops}</span>
            <span class="pill pill-gray">${D.best_option.travel_time}</span>
            <span class="pill pill-gray">${D.best_option.dates}</span>
          </div>
          <div style="margin-top:.75rem;font-size:.82rem;color:#64748b;">${D.best_option.notes}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="big-price over">${D.best_option.price_display}</div>
          <div class="price-sub">est. total · OVER BUDGET</div>
          <div style="margin-top:.5rem;">
            <a href="${D.best_option.booking_url}" target="_blank" class="link-btn" style="display:inline-block;font-size:.8rem;padding:.4rem .8rem;">Check on Kayak →</a>
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrap mb-1">
      <div class="table-header">All Options — Ranked Cheapest to Most Expensive</div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th>#</th><th>Price</th><th>Route</th><th>Airline</th><th>Ref. Dates</th><th>Stops</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${D.flights.map(f => `
              <tr class="${f.rejected ? 'rejected-row' : ''}">
                <td style="color:#64748b;font-weight:600;">${f.rank ?? '—'}</td>
                <td class="td-price ${f.price_numeric <= budget ? 'ok' : 'over'}">${f.price_display}</td>
                <td style="color:${destColor(f.dest)};font-weight:${['MAN','LBA'].includes(f.dest)?'600':'400'}">
                  ${f.route}
                </td>
                <td style="color:#94a3b8;">${f.airline}</td>
                <td style="color:#64748b;font-size:.78rem;">${f.ref_dates}</td>
                <td>${badge(f.stops, f.stops.startsWith('1') ? 'green' : 'red')}</td>
                <td>${f.rejected
                  ? badge('❌ REJECTED', 'gray')
                  : f.price_numeric <= budget
                    ? badge('✅ IN BUDGET', 'green')
                    : badge('⚠ OVER BUDGET', 'red')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="padding:.6rem 1rem;font-size:.72rem;color:#475569;border-top:1px solid #2d3748;display:flex;gap:1.5rem;flex-wrap:wrap;">
        <span><strong style="color:#a78bfa;">Purple</strong> = Leeds Bradford (priority #2)</span>
        <span><strong style="color:#60a5fa;">Blue</strong> = Manchester (priority #1)</span>
        <span>Greyed rows = rejected (date violation)</span>
      </div>
    </div>

    <div class="card mb-1">
      <div class="card-title">Budget vs. Market</div>
      ${D.market_bars.map(b => `
        <div class="market-bar-label"><span>${b.label}</span><span style="color:#f87171;">${b.price}</span></div>
        <div class="market-bar"><div class="market-bar-fill" style="width:${b.pct}%;"></div></div>
      `).join('')}
      <div style="font-size:.72rem;color:#475569;margin-top:.4rem;">$${budget} budget sits far left. Every bar exceeds it.</div>
    </div>

    <div class="grid-2 mb-1">
      <div class="card">
        <div class="card-title">Price Drop Log</div>
        ${D.price_drops.length === 0
          ? '<div class="log-empty">No drops recorded yet.<br>Watching hourly.</div>'
          : D.price_drops.map(p => `
              <div class="rejected-item">
                <div class="rejected-icon">↓</div>
                <div><div>${p.date} — saved $${p.saving}</div><div class="rejected-reason">${p.from} → ${p.to} · ${p.route}</div></div>
              </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Rejected Flights</div>
        ${D.rejected.map(r => `
          <div class="rejected-item">
            <div class="rejected-icon">✕</div>
            <div><div>${r.flight}</div><div class="rejected-reason">${r.reason}</div></div>
          </div>`).join('')}
      </div>
    </div>

    <div class="card mb-1">
      <div class="card-title">Strategies to Watch</div>
      ${D.tips.map(t => `
        <div class="tip">
          <div>${t.icon}</div>
          <div class="tip-text">${t.text}</div>
        </div>`).join('')}
    </div>

    <div class="card mb-1">
      <div class="card-title">Search Now</div>
      <div class="link-grid">
        ${D.search_links.map(l => `<a class="link-btn" href="${l.url}" target="_blank">${l.label}</a>`).join('')}
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">Search History</div>
      <table>
        <thead><tr><th>Run</th><th>Date</th><th>Type</th><th>Cheapest Found</th><th>Notes</th></tr></thead>
        <tbody>
          ${D.history.map(h => `
            <tr>
              <td style="color:#64748b;">#${h.run}</td>
              <td>${h.date}</td>
              <td>${badge(h.type === 'manual' ? 'Manual' : 'Auto', h.type === 'manual' ? 'blue' : 'green')}</td>
              <td class="td-price over">${h.cheapest}</td>
              <td style="color:#94a3b8;font-size:.82rem;">${h.notes}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="footer">
      <span class="update-pulse"></span>
      Automated hourly scans active &nbsp;·&nbsp;
      Results at <a href="https://claude.ai/code/routines">claude.ai/code/routines</a> &nbsp;·&nbsp;
      GitHub: <a href="https://github.com/findlayymckeown/Flights">findlayymckeown/Flights</a> &nbsp;·&nbsp;
      Last updated: ${new Date(D.meta.last_updated).toLocaleString()}
    </div>
  `;

  document.getElementById('app').innerHTML = html;
})();
</script>
</body>
</html>
